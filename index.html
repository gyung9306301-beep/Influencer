<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Influencer Rankings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>
        <span class="cyan">TikTok Influencer</span>
        <span class="white">Ranking</span>
        <span class="green">List</span>
      </h1>

      <div class="toolbar">
        <div class="field">
          <label for="searchInput">Search</label>
          <input id="searchInput" class="input" type="text" placeholder="A / B / D / E 열 기준 검색" />
        </div>

        <div class="field">
          <label for="categoryFilter">카테고리</label>
          <select id="categoryFilter" class="select">
            <option value="">전체</option>
          </select>
        </div>

        <div class="field" style="display: none;">
          <label for="pageSize">Rows Per Page</label>
          <select id="pageSize" class="select">
            <option value="11" selected>11</option>
          </select>
        </div>

        <button id="resetBtn" class="btn">필터 초기화</button>
      </div>
    </section>

    <section class="panel">
      <div class="meta">
        <div class="meta-left">
          <div class="pill" id="countPill">0 rows</div>
        </div>
        <div class="pill" id="updatedPill">Updated: -</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-key="B">닉네임</th>
              <th data-key="D">팔로워수</th>
              <th data-key="E">등급</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="4" class="loading">데이터를 불러오는 중입니다...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="meta" style="margin-top:14px; margin-bottom:0;">
        <div class="meta-left">
          <button id="prevBtn" class="btn">이전</button>
          <button id="nextBtn" class="btn">다음</button>
          <div class="pill" id="pagePill">Page 1 / 1</div>
        </div>
        <div class="status" id="statusText">준비 중...</div>
      </div>
    </section>
  </div>

  <script src="main.js"></script>
</body>
</html>
