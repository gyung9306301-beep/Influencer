<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SN11NCE3YL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-SN11NCE3YL');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TikTok Influencer Ranking</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="auth.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="hero" style="min-height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
      <h1>
        <span class="cyan">Member</span>
        <span class="white">Login</span>
      </h1>
      <p style="color: var(--muted); margin-top: 10px;">인플루언서 랭킹 데이터를 더 편리하게 이용하세요.</p>
    </section>

    <section style="display: flex; justify-content: center; margin-top: -50px; padding: 0 20px;">
      <div class="panel" style="width: 100%; max-width: 450px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
        
        <div id="login-section">
          <h2 style="margin-top: 0; margin-bottom: 25px; text-align: center;">로그인</h2>
          <div class="field">
            <label for="login-email">이메일 주소</label>
            <input type="email" id="login-email" class="input" placeholder="example@email.com">
          </div>
          <div class="field">
            <label for="login-password">비밀번호</label>
            <input type="password" id="login-password" class="input" placeholder="********">
          </div>
          <div id="login-error" style="color: #ff5f5f; font-size: 14px; margin-bottom: 15px; min-height: 18px; text-align: center;"></div>
          <button id="submit-login" class="upgrade-btn" style="width: 100%; height: 50px; font-size: 16px;">로그인하기</button>
          
          <div style="margin-top: 25px; text-align: center; font-size: 14px; color: var(--muted);">
            계정이 없으신가요? <a href="#" id="show-signup" style="color: var(--cyan); text-decoration: none; font-weight: 600;">회원가입</a>
          </div>
        </div>

        <div id="signup-section" style="display: none;">
          <h2 style="margin-top: 0; margin-bottom: 25px; text-align: center;">회원가입</h2>

          <div class="field">
            <label for="signup-email">이메일 주소</label>
            <input type="email" id="signup-email" class="input" placeholder="example@email.com">
          </div>

          <div class="field">
            <label for="signup-password">비밀번호</label>
            <input type="password" id="signup-password" class="input" placeholder="최소 6자 이상">
          </div>

          <div class="field">
            <label for="signup-password-confirm">비밀번호 확인</label>
            <input type="password" id="signup-password-confirm" class="input" placeholder="비밀번호를 다시 입력하세요">
          </div>

          <div class="field">
            <label for="signup-role">사용자 유형</label>
            <select id="signup-role" class="input">
              <option value="">선택하세요</option>
              <option value="marketer">마케터(고객사)</option>
              <option value="influencer">인플루언서</option>
              <option value="project_manager">프로젝트 매니저</option>
            </select>
          </div>

          <div id="marketer-extra" style="display:none;">
            <div class="field">
              <label for="signup-company-name">회사 풀네임</label>
              <input type="text" id="signup-company-name" class="input" placeholder="회사명을 입력하세요">
            </div>

            <div class="field">
              <label for="signup-business-number">회사 사업자등록번호</label>
              <input type="text" id="signup-business-number" class="input" placeholder="사업자등록번호를 입력하세요">
            </div>

            <div class="field">
              <label for="signup-department">담당 부서명</label>
              <input type="text" id="signup-department" class="input" placeholder="예: 마케팅팀">
            </div>

            <div class="field">
              <label for="signup-manager-name">담당자 이름</label>
              <input type="text" id="signup-manager-name" class="input" placeholder="담당자 이름을 입력하세요">
            </div>
          </div>

          <div id="pm-extra" style="display:none;">
  <div class="field">
    <label>본명</label>
    <input type="text" id="pm-name" class="input" placeholder="이름을 입력하세요">
  </div>

  <div class="field">
    <label>사용 가능 언어</label>
    <input type="text" id="pm-languages" class="input" placeholder="예: 한국어, 영어, 태국어">
  </div>

  <div class="field">
    <label>전화번호</label>
    <input type="text" id="pm-phone" class="input" placeholder="전화번호를 입력하세요">
  </div>

  <div class="field">
    <label>나이</label>
    <input type="number" id="pm-age" class="input" placeholder="나이를 입력하세요">
  </div>

  <div class="field">
    <label>연락 수단</label>
    <select id="pm-contact-method" class="input">
      <option value="">선택하세요</option>
      <option value="line">라인</option>
      <option value="kakao">카카오톡</option>
      <option value="email">이메일</option>
      <option value="phone">전화번호</option>
    </select>
  </div>

  <div class="field">
    <label>LINE ID</label>
    <input type="text" id="pm-line" class="input" placeholder="라인 ID">
  </div>

  <div class="field">
    <label>카카오톡 ID</label>
    <input type="text" id="pm-kakao" class="input" placeholder="카카오톡 ID">
  </div>

  <div class="field">
    <label>주요 경력</label>
    <textarea id="pm-experience" class="input" placeholder="경력을 입력하세요"></textarea>
  </div>
</div>         

          <div class="field">
            <label for="signup-industry">업종</label>
            <select id="signup-industry" class="input">
              <option value="">선택하세요</option>
              <option value="beauty">화장품</option>
              <option value="fashion">패션</option>
              <option value="goods">잡화</option>
              <option value="food">식품</option>
              <option value="other">기타</option>
            </select>
          </div>

          <div class="field" id="industry-other-wrap" style="display:none;">
            <label for="signup-industry-other">기타 업종 직접 입력</label>
            <input type="text" id="signup-industry-other" class="input" placeholder="업종을 직접 입력하세요">
          </div>

          <div id="signup-error" style="color: #ff5f5f; font-size: 14px; margin-bottom: 15px; min-height: 18px; text-align: center;"></div>

          <button id="submit-signup" class="upgrade-btn" style="width: 100%; height: 50px; font-size: 16px;">가입하기</button>

          <div style="margin-top: 25px; text-align: center; font-size: 14px; color: var(--muted);">
            이미 계정이 있으신가요? <a href="#" id="show-login" style="color: var(--cyan); text-decoration: none; font-weight: 600;">로그인</a>
          </div>
        </div>

        <div style="margin-top: 20px; text-align: center;">
          <a href="index.html" style="color: var(--muted); font-size: 13px; text-decoration: none;">메인페이지로 돌아가기</a>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="privacy-policy.html#privacy">Privacy Policy</a>
        <a href="privacy-policy.html#terms">Terms of Service</a>
      </div>
    </footer>
  </div>

  <script type="module">
    import { login, signUp } from './auth.js';

    const loginSection = document.getElementById('login-section');
    const signupSection = document.getElementById('signup-section');
    const showSignup = document.getElementById('show-signup');
    const showLogin = document.getElementById('show-login');

    showSignup.onclick = (e) => {
      e.preventDefault();
      loginSection.style.display = 'none';
      signupSection.style.display = 'block';
    };

    showLogin.onclick = (e) => {
      e.preventDefault();
      signupSection.style.display = 'none';
      loginSection.style.display = 'block';
    };

    // Login logic
    document.getElementById('submit-login').onclick = async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      
      try {
        errorDiv.textContent = '';
        await login(email, password);
        window.location.href = 'ranking.html';
      } catch (err) {
        errorDiv.textContent = err.message;
      }
    };

    const roleInput = document.getElementById('signup-role');
    const marketerExtra = document.getElementById('marketer-extra');
    const industryInput = document.getElementById('signup-industry');
    const industryOtherWrap = document.getElementById('industry-other-wrap');
    const industryOtherInput = document.getElementById('signup-industry-other');

    const pmExtra = document.getElementById('pm-extra');

roleInput.addEventListener('change', () => {
  if (roleInput.value === 'marketer') {
    marketerExtra.style.display = 'block';
    pmExtra.style.display = 'none';

    // 프로젝트 매니저 입력값 초기화
    document.getElementById('pm-name').value = '';
    document.getElementById('pm-languages').value = '';
    document.getElementById('pm-phone').value = '';
    document.getElementById('pm-age').value = '';
    document.getElementById('pm-contact-method').value = '';
    document.getElementById('pm-line').value = '';
    document.getElementById('pm-kakao').value = '';
    document.getElementById('pm-experience').value = '';
  } else if (roleInput.value === 'project_manager') {
    marketerExtra.style.display = 'none';
    pmExtra.style.display = 'block';

    // 마케터 입력값 초기화
    document.getElementById('signup-company-name').value = '';
    document.getElementById('signup-business-number').value = '';
    document.getElementById('signup-department').value = '';
    document.getElementById('signup-manager-name').value = '';
  } else {
    marketerExtra.style.display = 'none';
    pmExtra.style.display = 'none';

    // 둘 다 초기화
    document.getElementById('signup-company-name').value = '';
    document.getElementById('signup-business-number').value = '';
    document.getElementById('signup-department').value = '';
    document.getElementById('signup-manager-name').value = '';

    document.getElementById('pm-name').value = '';
    document.getElementById('pm-languages').value = '';
    document.getElementById('pm-phone').value = '';
    document.getElementById('pm-age').value = '';
    document.getElementById('pm-contact-method').value = '';
    document.getElementById('pm-line').value = '';
    document.getElementById('pm-kakao').value = '';
    document.getElementById('pm-experience').value = '';
  }
});

    industryInput.addEventListener('change', () => {
      if (industryInput.value === 'other') {
        industryOtherWrap.style.display = 'block';
      } else {
        industryOtherWrap.style.display = 'none';
        industryOtherInput.value = '';
      }
    });

    // Signup logic
    document.getElementById('submit-signup').onclick = async () => {
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value.trim();
      const passwordConfirm = document.getElementById('signup-password-confirm').value.trim();

      const role = document.getElementById('signup-role').value;

      const companyName = document.getElementById('signup-company-name')?.value.trim();
      const businessNumber = document.getElementById('signup-business-number')?.value.trim();
      const department = document.getElementById('signup-department')?.value.trim();
      const managerName = document.getElementById('signup-manager-name')?.value.trim();

      const industry = document.getElementById('signup-industry').value;
      const industryOther = document.getElementById('signup-industry-other')?.value.trim();

      const errorDiv = document.getElementById('signup-error');

      errorDiv.textContent = '';

      if (!email || !password || !passwordConfirm) {
        errorDiv.textContent = '이메일과 비밀번호를 모두 입력해주세요.';
        return;
      }

      if (password !== passwordConfirm) {
        errorDiv.textContent = '비밀번호가 일치하지 않습니다.';
        return;
      }

      if (!role) {
        errorDiv.textContent = '사용자 유형을 선택해주세요.';
        return;
      }

      if (role === 'marketer') {
        if (!companyName || !businessNumber || !department || !managerName) {
          errorDiv.textContent = '회사 정보를 모두 입력해주세요.';
          return;
        }
      }

      if (!industry) {
        errorDiv.textContent = '업종을 선택해주세요.';
        return;
      }

      if (industry === 'other' && !industryOther) {
        errorDiv.textContent = '기타 업종을 입력해주세요.';
        return;
      }

      try {
        await signUp(email, password);
        alert('가입 확인 이메일이 발송되었습니다. 이메일을 확인해 주세요!');
        signupSection.style.display = 'none';
        loginSection.style.display = 'block';
      } catch (err) {
        errorDiv.textContent = err.message;
      }
    };
  </script>
</body>
</html>
